<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-4">
                <!--Inicio Card-->
                <div class="card shadow">
                    <div class="card-header bg-warning text-white">
                        Actividades
                    </div>

                    <div class="card-body">
                        <h5 class="card-title">Card</h5>
                        <a href="#" class="btn btn-warning">Ver</a>
                    </div>

                    </div>

                </div>
                
            </div>

<div class="col-4">
                <!--Inicio Card-->
                <div class="card shadow">
                    <div class="card-header bg-secondary text-white">
                        Reporte de ventas
                    </div>

                    <div class="card-body">
                        <h5 class="card-title">Ventas Mensuales</h5>
                        <h6 class="card-subtitle mb-2">Diciembre 2026</h6>

                        <p class="card-text">Las ventas incrementaron un 12%</p>    

                        <a href="#" class="btn btn-secondary">Ver detalles</a>

                    </div>

                    <div class="card-footer text-muted">
                        <span>Actualizado hace 1 mes</span>

                    </div>
                </div>
            </div>


            <div class="col-4">
                <!--Inicio Card-->
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        Reporte de ventas
                    </div>

                    <div class="card-body">
                        <h5 class="card-title">Ventas Mensuales</h5>
                        <h6 class="card-subtitle mb-2">Enero 2026</h6>

                        <p class="card-text">Las ventas incrementaron un 20% respecto al año pasado</p>    

                        <a href="#" class="btn btn-success">Ver detalles</a>

                    </div>

                    <div class="card-footer text-muted">
                        <span>Actualizado hace 2 días</span>

                    </div>
                </div>
            </div>
        </div>
    </div>
   

       <!--End Card-->




          
       


    <script src="js/bootstrap.min.js"></script>
</body>
</html>
